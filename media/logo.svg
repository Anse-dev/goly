<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- G letter stylized as parallel layers -->
  <g fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer arc (G shape) -->
    <path d="M 168 88 A 64 64 0 1 0 168 168"/>
    
    <!-- Cross bar of G -->
    <line x1="128" y1="168" x2="168" y2="168"/>
    
    <!-- Inner parallel lines (representing worktrees) -->
    <line x1="72" y1="100" x2="140" y2="100"/>
    <line x1="72" y1="128" x2="140" y2="128"/>
    <line x1="72" y1="156" x2="140" y2="156"/>
  </g>
  
  <!-- Dots at line ends (worktree nodes) -->
  <g fill="#fff">
    <circle cx="72" cy="100" r="8"/>
    <circle cx="72" cy="128" r="8"/>
    <circle cx="72" cy="156" r="8"/>
    <circle cx="140" cy="100" r="8"/>
    <circle cx="140" cy="128" r="8"/>
    <circle cx="140" cy="156" r="8"/>
  </g>
  
  <!-- Connecting diagonal (flow) -->
  <line x1="80" y1="92" x2="132" y2="136" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="120" x2="132" y2="156" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
