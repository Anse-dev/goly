<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="40" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white">
    Goly
  </text>
  
  <!-- Subtitle -->
  <text x="40" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a0aec0">
    Parallel Workspaces &amp; Worktree Cockpit
  </text>
  
  <!-- Divider -->
  <rect x="40" y="120" width="200" height="3" fill="url(#accent)" rx="2"/>
  
  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12">
    <rect x="40" y="140" width="100" height="28" fill="#6366F1" fill-opacity="0.2" rx="14"/>
    <text x="90" y="158" text-anchor="middle" fill="#818cf8">🎛️ Cockpit</text>
    
    <rect x="150" y="140" width="80" height="28" fill="#10B981" fill-opacity="0.2" rx="14"/>
    <text x="190" y="158" text-anchor="middle" fill="#34d399">🔌 Ports</text>
    
    <rect x="240" y="140" width="70" height="28" fill="#F59E0B" fill-opacity="0.2" rx="14"/>
    <text x="275" y="158" text-anchor="middle" fill="#fbbf24">🤖 Agents</text>
    
    <rect x="320" y="140" width="90" height="28" fill="#EC4899" fill-opacity="0.2" rx="14"/>
    <text x="365" y="158" text-anchor="middle" fill="#f472b6">🔍 Review</text>
    
    <rect x="420" y="140" width="90" height="28" fill="#06B6D4" fill-opacity="0.2" rx="14"/>
    <text x="465" y="158" text-anchor="middle" fill="#22d3ee">💾 Snapshots</text>
  </g>
  
  <!-- Terminal preview -->
  <rect x="520" y="30" width="240" height="150" fill="#0f0f23" stroke="#2d2d4a" stroke-width="2" rx="8"/>
  
  <!-- Terminal header -->
  <circle cx="535" cy="45" r="5" fill="#ef4444"/>
  <circle cx="550" cy="45" r="5" fill="#eab308"/>
  <circle cx="565" cy="45" r="5" fill="#22c55e"/>
  
  <!-- Terminal content -->
  <text x="535" y="75" font-family="Menlo, Monaco, monospace" font-size="10" fill="#68d391">
    ● main        ↑2 ~12  :3000
  </text>
  <text x="535" y="92" font-family="Menlo, Monaco, monospace" font-size="10" fill="#68d391">
    ● feature/payment  :3001 🤖
  </text>
  <text x="535" y="109" font-family="Menlo, Monaco, monospace" font-size="10" fill="#a0aec0">
    ● review/pr-152    :3002
  </text>
  
  <!-- Cursor -->
  <rect x="535" y="125" width="8" height="14" fill="#6366F1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Install badge -->
  <rect x="560" y="155" width="180" height="24" fill="#6366F1" rx="4"/>
  <text x="650" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">
    Install Now →
  </text>
</svg>
